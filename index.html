<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100次挑戰紀錄</title>
    <style>
        :root { --p-red: #FF4136; --p-yellow: #FFDC00; --bg: #F8F4F0; }
        body { background: var(--bg); color: #333; font-family: "PingFang TC", sans-serif; margin: 0; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        
        .header { background: #000; padding: 15px; color: white; text-align: center; border-bottom: 3px solid var(--p-red); position: sticky; top: 0; z-index: 100; }
        .tab-content { display: none; padding: 20px; max-width: 450px; margin: 0 auto; }
        .tab-content.active { display: block; }

        .game-card { background: white; border: 2px solid #000; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .game-card.done { border-color: #ccc; color: #bbb; opacity: 0.6; }
        .check-box { width: 28px; height: 28px; border: 2px solid #000; margin-right: 12px; display: flex; align-items: center; justify-content: center; background: #fff; }
        .game-card.done .check-box::after { content: '✔'; color: var(--p-red); font-size: 24px; font-weight: bold; }

        .bonus-card { background: white; border: 2px solid #000; padding: 18px; margin-top: 25px; display: flex; align-items: center; cursor: pointer; }
        .bonus-card.collected { background: var(--p-yellow); color: #000; border-color: #000; box-shadow: 4px 4px 0 #000; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: white; padding: 12px; border: 2px solid #000; margin-top: 15px; }
        .cell { aspect-ratio: 1; border: 1px solid #eee; background: #f9f9f9; font-size: 8px; display: flex; align-items: center; justify-content: center; color: #ccc; }
        .cell.filled { background: var(--p-red); color: white; border-color: #000; }
        .cell.gold-filled { background: var(--p-yellow); color: black; border-color: #000; font-weight: bold; }

        #final-reveal-btn { 
            display: none; width: auto; padding: 12px 24px; background: #000; color: #fff; 
            border: none; font-size: 14px; font-weight: bold; margin: 20px auto;
            cursor: pointer; text-align: center; letter-spacing: 2px; box-shadow: 4px 4px 0 var(--p-red);
        }

        /* 🏆 證書樣式 */
        #cert-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }
        #cert-box {
            width: 100%; max-width: 350px; max-height: 85vh;
            background: #FAF5F0; color: #000; padding: 45px 30px; text-align: left; position: relative;
            overflow-y: auto; transform: translateY(20px); opacity: 0; transition: 0.5s ease;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }
        #cert-box.show { transform: translateY(0); opacity: 1; }
        #cert-box::before { content: ''; position: absolute; top: 0; left: 0; width: 50px; height: 10px; background: var(--p-red); }
        
        .c-header { font-size: 10px; letter-spacing: 4px; color: #aaa; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .c-body { font-size: 15px; line-height: 2.1; color: #333; margin-bottom: 25px; }
        .c-body b { color: var(--p-red); font-weight: 900; }
        .highlight { font-weight: 900; border-bottom: 2px solid var(--p-yellow); padding: 0 2px; }

        .data-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #000; }
        .data-line { font-size: 13px; color: #666; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .final-amount-box { margin-top: 30px; text-align: right; }
        .final-amount-val { font-size: 32px; font-weight: 900; color: var(--p-red); font-family: "Impact", sans-serif; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; height: 70px; border-top: 3px solid var(--p-red); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 12px; }
        .nav-item.active { color: var(--p-yellow); font-weight: bold; }
        #test-btn { position: fixed; bottom: 85px; right: 15px; font-size: 10px; color: #ddd; background: none; border: none; opacity: 0.5; }
    </style>
</head>
<body onload="initGame()">

    <button id="test-btn" onclick="runTest()">[DEBUG]</button>

    <div class="header"><div style="font-size: 14px; font-weight: 900; letter-spacing: 1px;">100次挑戰紀錄</div></div>

    <div id="tab-play" class="tab-content active">
        <div id="task-meal" class="game-card" onclick="processTask('task-meal', 10, true)"><div class="check-box"></div><div><b>飽足的一餐</b><br><small>原型食物</small></div></div>
        <div id="task-drink" class="game-card" onclick="processTask('task-drink', 10, true)"><div class="check-box"></div><div><b>純粹的飲用</b><br><small>無糖飲品</small></div></div>
        <div id="task-bonus" class="bonus-card" onclick="processBonus('task-bonus', 20)"><div style="width:25px; font-weight:bold; color:var(--p-yellow); text-align:center; margin-right:10px; font-size:20px;">★</div><div><b>特殊成就</b><br><small>身體動動</small></div></div>
        <p id="day-status" style="text-align:center; font-size:12px; color:#aaa; margin-top:20px;">今日任務尚未完成</p>
    </div>

    <div id="tab-map" class="tab-content">
        <button id="final-reveal-btn" onclick="openCertificate()">查看結業證明</button>
        <div class="grid" id="map-grid"></div>
        <p style="text-align:center; font-size:10px; color:#888; margin-top:15px;">已累積 <span id="display-count">0</span> / 100 次冒險</p>
    </div>

    <div id="cert-overlay">
        <div id="cert-box">
            <div class="c-header">OFFICIAL RECORD / 2026</div>
            <div class="c-body" id="dynamic-text"></div>
            <div class="data-section">
                <div class="data-line"><span>基礎積分獎金</span><span>NT$ <span id="res-base">0</span></span></div>
                <div class="data-line"><span>提速達成獎勵</span><span>NT$ <span id="res-bonus">0</span></span></div>
                <div class="final-amount-box">
                    <div style="font-size:10px; color:#888;">應得總額</div>
                    <div class="final-amount-val">NT$ <span id="res-total">0</span></div>
                </div>
            </div>
            <button onclick="resetGame()" style="margin-top:40px; background:none; border:none; color:#bbb; text-decoration:underline; font-size:10px; cursor:pointer; padding:0;">RESET ALL DATA</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('play', this)">任務</div>
        <div class="nav-item" onclick="switchTab('map', this)">紀錄</div>
    </div>

    <script>
        let totalExp = 0, baseCount = 0, bonusCount = 0;
        let todayMarked = false, hasBonusToday = false;
        const startDate = new Date('2026-03-31'), deadline = new Date('2026-07-31');

        function initGrid() {
            const grid = document.getElementById('map-grid');
            grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = 'c'+i; cell.innerText = i;
                grid.appendChild(cell);
            }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            el.classList.add('active');
        }

        function processTask(id, pts, isBase) {
            const el = document.getElementById(id);
            if(!el.classList.contains('done')) {
                el.classList.add('done');
                totalExp += pts;
                if(isBase && !todayMarked && baseCount < 100) {
                    baseCount++; todayMarked = true;
                    updateCellVisual(); checkHundred();
                }
                saveData();
            }
        }

        function processBonus(id, pts) {
            const el = document.getElementById(id);
            if(!el.classList.contains('collected')) {
                el.classList.add('collected');
                totalExp += pts;
                if(bonusCount < 100) bonusCount++;
                hasBonusToday = true;
                if(todayMarked) updateCellVisual();
                saveData();
            }
        }

        function updateCellVisual() {
            const cell = document.getElementById('c' + baseCount);
            if(cell) cell.className = hasBonusToday ? 'cell gold-filled' : 'cell filled';
            document.getElementById('display-count').innerText = baseCount;
            document.getElementById('day-status').innerText = "今日冒險已收錄！";
        }

        function checkHundred() { if(baseCount === 100) document.getElementById('final-reveal-btn').style.display = 'block'; }

        // 💾 存檔與讀取
        function saveData() {
            const history = JSON.parse(localStorage.getItem('c100_history') || "[]");
            const state = {
                totalExp, baseCount, bonusCount, todayMarked, hasBonusToday,
                lastDate: new Date().toDateString(),
                cellClasses: Array.from(document.querySelectorAll('.cell')).map(c => c.className)
            };
            localStorage.setItem('c100_state', JSON.stringify(state));
        }

        function initGame() {
            initGrid();
            const saved = localStorage.getItem('c100_state');
            if(saved) {
                const data = JSON.parse(saved);
                const isNewDay = data.lastDate !== new Date().toDateString();
                
                totalExp = data.totalExp;
                baseCount = data.baseCount;
                bonusCount = data.bonusCount;
                
                // 跨日檢查：如果是新的一天，重置當日狀態
                todayMarked = isNewDay ? false : data.todayMarked;
                hasBonusToday = isNewDay ? false : data.hasBonusToday;
                
                if(!isNewDay) {
                    if(todayMarked) {
                        document.getElementById('task-meal').classList.add('done');
                        document.getElementById('task-drink').classList.add('done');
                        document.getElementById('day-status').innerText = "今日冒險已收錄！";
                    }
                    if(hasBonusToday) document.getElementById('task-bonus').classList.add('collected');
                }

                data.cellClasses.forEach((cls, i) => {
                    const cell = document.getElementById('c' + (i+1));
                    if(cell) cell.className = cls;
                });
                document.getElementById('display-count').innerText = baseCount;
                checkHundred();
            }
        }

        function openCertificate() {
            const now = new Date();
            const mm = String(now.getMonth() + 1).padStart(2, '0'), dd = String(now.getDate()).padStart(2, '0');
            const diffDays = Math.ceil(Math.abs(now - startDate) / (1000 * 60 * 60 * 24));
            const completionRate = Math.round(((baseCount + bonusCount) / 100) * 100);
            const baseCash = Math.round(totalExp * 1.6667);
            const bonus = (now <= deadline) ? 2000 : 0;

            document.getElementById('dynamic-text').innerHTML = `
                終於走到這裡了！<br>
                從 03/31 – <span class="highlight">${mm}/${dd}</span><br>
                在這 <span class="highlight">${diffDays}</span> 天裡，終於完成了 100 次挑戰！<br><br>
                克服了<b>無糖鮮奶茶</b>真的很不容易啊！<br>
                會想念有糖鮮奶茶的味道嗎？<br>
                這次有成功達到自己想要的樣子了嗎？<br><br>
                但不管如何，妳堅持到了最後。<br>
                在這段日子內，妳完成度是：<span class="highlight">${completionRate}%</span>。<br>
                總共得到 <span class="highlight">${totalExp}</span> 積分。<br>
                辛苦了，這是一份送給妳的禮物。
            `;
            
            document.getElementById('res-base').innerText = baseCash.toLocaleString();
            document.getElementById('res-bonus').innerText = bonus.toLocaleString();
            document.getElementById('res-total').innerText = (baseCash + bonus).toLocaleString();
            document.getElementById('cert-overlay').style.display = 'flex';
            setTimeout(() => { document.getElementById('cert-box').classList.add('show'); }, 100);
        }

        function resetGame() { if(confirm("確定要刪除所有進度嗎？此操作無法還原！")) { localStorage.clear(); location.reload(); } }
        
        function runTest() {
            baseCount = 100; bonusCount = 100; totalExp = 4000;
            for(let i=1; i<=100; i++) document.getElementById('c'+i).className = 'cell gold-filled';
            checkHundred(); saveData();
        }
    </script>
</body>
</html>
